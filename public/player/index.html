<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #080c14; color: #e0e0e0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #080c14; } ::-webkit-scrollbar-thumb { background: #2a3050; border-radius: 3px; }

    /* Login - Xtream Style */
    .login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(ellipse at center, #0d1525 0%, #080c14 70%); }
    .login-card { background: #0f1525; padding: 36px; border-radius: 18px; width: 420px; box-shadow: 0 25px 80px rgba(0,0,0,0.6); border: 1px solid #1a2040; }
    .login-card .logo { text-align: center; margin-bottom: 24px; }
    .login-card .logo h1 { font-size: 30px; background: linear-gradient(135deg, #e94560, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-card .logo p { color: #4a5a7a; font-size: 13px; margin-top: 4px; }
    .login-card .tabs { display: flex; margin-bottom: 24px; border-radius: 10px; overflow: hidden; background: #080c14; }
    .login-card .tabs button { flex: 1; padding: 10px; border: none; background: transparent; color: #4a5a7a; cursor: pointer; font-size: 13px; font-weight: 600; }
    .login-card .tabs button.active { background: #e94560; color: white; }
    .input-group { margin-bottom: 14px; }
    .input-group label { display: block; color: #4a5a7a; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .input-group input { width: 100%; padding: 12px 14px; border: 1px solid #1a2040; border-radius: 10px; background: #080c14; color: #e0e0e0; font-size: 14px; transition: border 0.2s; }
    .input-group input:focus { outline: none; border-color: #e94560; }
    .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #e94560, #c23152); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 6px; }
    .login-btn:hover { opacity: 0.9; }
    .login-error { color: #ff4757; text-align: center; margin-bottom: 10px; display: none; font-size: 13px; }
    .login-hint { text-align: center; margin-top: 16px; color: #4a5a7a; font-size: 12px; }
    .login-hint a { color: #e94560; cursor: pointer; text-decoration: none; }

    /* App */
    .app { display: none; }

    /* Top Bar */
    .topbar { background: #0d1220; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid #1a2040; }
    .topbar .brand { font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #e94560, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar .user-section { display: flex; align-items: center; gap: 14px; }
    .topbar .user-section .info { font-size: 12px; color: #4a5a7a; }
    .topbar .user-section .info strong { color: #e0e0e0; }
    .topbar .badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; }
    .topbar button { background: none; border: 1px solid #1a2040; color: #6a7a9a; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .topbar button:hover { border-color: #e94560; color: #e94560; }

    /* Navigation */
    .nav { display: flex; background: #0a0f1a; border-bottom: 1px solid #1a2040; padding: 0 20px; }
    .nav a { padding: 12px 20px; color: #4a5a7a; text-decoration: none; cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .nav a:hover { color: #e0e0e0; }
    .nav a.active { color: #e94560; border-bottom-color: #e94560; }

    /* Content Area */
    .content { padding: 20px; max-width: 1400px; margin: 0 auto; }

    /* Player */
    .player-area { display: none; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; position: relative; max-width: 1000px; margin-left: auto; margin-right: auto; }
    .player-area.show { display: block; }
    .player-area video { width: 100%; max-height: 520px; display: block; background: #000; }
    .player-area .close-btn { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; z-index: 10; font-size: 13px; }
    .player-meta { padding: 16px 0; max-width: 1000px; margin: 0 auto 20px; }
    .player-meta h2 { margin-bottom: 6px; font-size: 20px; }
    .player-meta p { color: #4a5a7a; font-size: 14px; }

    /* Category Filter */
    .cats { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .cats button { padding: 7px 16px; border-radius: 20px; border: 1px solid #1a2040; background: transparent; color: #4a5a7a; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .cats button.active { background: linear-gradient(135deg, #e94560, #c23152); border-color: #e94560; color: white; }
    .cats button:hover { border-color: #e94560; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    /* Card */
    .card { background: #0f1525; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.25s; border: 1px solid #1a2040; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(233,69,96,0.15); border-color: #e9456040; }
    .card .thumb { height: 130px; background: linear-gradient(135deg, #0d1525 0%, #1a1a35 100%); display: flex; align-items: center; justify-content: center; font-size: 42px; position: relative; }
    .card .thumb .live-badge { position: absolute; top: 8px; right: 8px; background: #e94560; color: white; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; }
    .card .thumb .rating { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #ffa500; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .card .body { padding: 12px; }
    .card .body h3 { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .body .meta { color: #4a5a7a; font-size: 11px; display: flex; justify-content: space-between; }

    /* Series Detail View */
    .series-detail { display: none; }
    .series-detail.show { display: block; }
    .series-header { display: flex; gap: 24px; margin-bottom: 24px; background: #0f1525; border-radius: 12px; padding: 20px; border: 1px solid #1a2040; }
    .series-header .poster { width: 180px; height: 250px; background: linear-gradient(135deg, #0d1525, #1a1a35); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 64px; flex-shrink: 0; }
    .series-header .info h2 { font-size: 24px; margin-bottom: 8px; }
    .series-header .info .tags { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .series-header .info .tags span { padding: 3px 10px; background: #1a2040; border-radius: 6px; font-size: 11px; color: #8899bb; }
    .series-header .info p { color: #6a7a9a; font-size: 14px; line-height: 1.6; }
    .series-header .back-btn { color: #e94560; cursor: pointer; font-size: 14px; margin-bottom: 8px; display: inline-block; }

    .season-selector { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .season-selector button { padding: 8px 18px; border-radius: 8px; border: 1px solid #1a2040; background: transparent; color: #6a7a9a; cursor: pointer; font-size: 13px; }
    .season-selector button.active { background: #e94560; border-color: #e94560; color: white; }

    .ep-list { }
    .ep-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #0f1525; border: 1px solid #1a2040; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
    .ep-item:hover { border-color: #e94560; background: #12182a; }
    .ep-item .ep-num { background: #1a2040; color: #e94560; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }
    .ep-item .ep-info h4 { font-size: 14px; margin-bottom: 2px; }
    .ep-item .ep-info span { color: #4a5a7a; font-size: 12px; }
    .ep-item .play-icon { margin-right: auto; color: #e94560; font-size: 20px; opacity: 0; transition: opacity 0.2s; }
    .ep-item:hover .play-icon { opacity: 1; }

    /* Profile */
    .profile-box { max-width: 500px; margin: 0 auto; background: #0f1525; border: 1px solid #1a2040; border-radius: 14px; padding: 28px; }
    .profile-box h2 { color: #e94560; margin-bottom: 20px; font-size: 20px; }
    .profile-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a2040; font-size: 14px; }
    .profile-row:last-child { border-bottom: none; }
    .profile-row .label { color: #4a5a7a; }

    .badge-trial { background: #ffa50020; color: #ffa500; }
    .badge-monthly { background: #00d4ff20; color: #00d4ff; }
    .badge-6months { background: #00ff8820; color: #00ff88; }
    .badge-yearly { background: #e9456020; color: #e94560; }

    .no-content { text-align: center; padding: 60px 20px; color: #4a5a7a; }
    .no-content .icon { font-size: 56px; margin-bottom: 12px; opacity: 0.5; }

    .cat-names { 'bein-sports': 'beIN Sports', 'bein-premium': 'beIN Premium' }

    @media(max-width:768px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .series-header { flex-direction: column; }
      .series-header .poster { width: 100%; height: 200px; }
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="logo">
      <h1>IPTV Player</h1>
      <p>Stream Channels, Movies & Series</p>
    </div>

    <div class="tabs" id="loginTabs">
      <button class="active" data-act="loginTab" data-tab="xtream">Xtream Login</button>
      <button data-act="loginTab" data-tab="direct">Direct Login</button>
      <button data-act="loginTab" data-tab="register">Register</button>
    </div>

    <div class="login-error" id="loginError"></div>

    <!-- Xtream Login -->
    <div id="tab-xtream">
      <div class="input-group"><label>Server URL (Host)</label><input id="xt_host" placeholder="http://your-server.com" value="" style="color:#4a5a7a;font-size:12px"></div>
      <div class="input-group"><label>Username</label><input id="xt_user" placeholder="Username"></div>
      <div class="input-group"><label>Password</label><input id="xt_pass" type="password" placeholder="Password"></div>
      <button class="login-btn" id="btn-xtream">Connect</button>
      <div class="login-hint">Connect using Xtream Codes API</div>
    </div>

    <!-- Direct Login -->
    <div id="tab-direct" style="display:none">
      <div class="input-group"><label>Username</label><input id="d_user" placeholder="Username"></div>
      <div class="input-group"><label>Password</label><input id="d_pass" type="password" placeholder="Password"></div>
      <button class="login-btn" id="btn-direct">Login</button>
    </div>

    <!-- Register -->
    <div id="tab-register" style="display:none">
      <div class="input-group"><label>Username</label><input id="r_user" placeholder="Choose username"></div>
      <div class="input-group"><label>Password</label><input id="r_pass" type="password" placeholder="Min 4 characters"></div>
      <button class="login-btn" id="btn-register">Create Account</button>
      <div class="login-hint">Free trial - 3 days</div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="brand">IPTV Player</div>
    <div class="user-section">
      <div class="info">
        <strong id="dispUser"></strong>
        <span class="badge" id="dispSub"></span>
      </div>
      <button data-act="profile">Profile</button>
      <button data-act="logout">Logout</button>
    </div>
  </div>

  <div class="nav" id="mainNav">
    <a class="active" data-act="showTab" data-tab="live">📺 Live TV</a>
    <a data-act="showTab" data-tab="movies">🎬 Movies</a>
    <a data-act="showTab" data-tab="series">📀 Series</a>
  </div>

  <!-- Player Area -->
  <div style="max-width:1400px;margin:0 auto;padding:0 20px">
    <div class="player-area" id="playerArea">
      <button class="close-btn" data-act="closePlayer">✕ Close</button>
      <video id="videoPlayer" controls autoplay></video>
    </div>
    <div class="player-meta" id="playerMeta" style="display:none">
      <h2 id="playerTitle"></h2>
      <p id="playerDesc"></p>
    </div>
  </div>

  <!-- Search Bar -->
  <div style="max-width:1400px;margin:8px auto;padding:0 20px">
    <div style="position:relative">
      <input type="text" id="globalSearch" placeholder="🔍 Search channels, movies, series..." style="width:100%;padding:12px 16px 12px 16px;background:#0d1220;border:1px solid #1a2040;border-radius:12px;color:#e0e0e0;font-size:14px;outline:none;transition:border 0.2s" onfocus="this.style.borderColor='#e94560'" onblur="this.style.borderColor='#1a2040'">
      <div id="searchResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:#0d1220;border:1px solid #1a2040;border-radius:0 0 12px 12px;max-height:400px;overflow-y:auto;z-index:100;box-shadow:0 15px 40px rgba(0,0,0,0.6)"></div>
    </div>
  </div>

  <div class="content">
    <!-- LIVE TV -->
    <div id="tab-live">
      <div class="cats" id="liveCats"></div>
      <div class="grid" id="liveGrid"></div>
    </div>

    <!-- MOVIES -->
    <div id="tab-movies" style="display:none">
      <div class="cats" id="movieCats"></div>
      <div class="grid" id="movieGrid"></div>
    </div>

    <!-- SERIES -->
    <div id="tab-series" style="display:none">
      <div class="series-detail" id="seriesDetail"></div>
      <div id="seriesListView">
        <div class="cats" id="seriesCats"></div>
        <div class="grid" id="seriesGrid"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="tab-profile" style="display:none">
      <div class="profile-box" id="profileBox"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
<script>
let serverUrl = '';
let token = null;
let channels=[], movies=[], series=[];
let loginMode = 'xtream'; // xtream or direct
let xtreamCredentials = null; // {host, username, password}

const catLabels = {
  'bein-sports':'beIN Sports','bein-premium':'beIN Premium','bein-movies':'beIN Movies','bein-entertainment':'beIN Entertainment',
  'news':'News','sports':'Sports','entertainment':'Entertainment','movies-channels':'Movies Channels',
  'kids':'Kids','music':'Music','documentary':'Documentary','religious':'Religious','general':'General',
  'action':'Action','comedy':'Comedy','drama':'Drama','horror':'Horror','sci-fi':'Sci-Fi',
  'animation':'Animation','arabic':'Arabic','thriller':'Thriller','romance':'Romance',
  'arabic-series':'Arabic Series'
};
const catIcons = {
  'bein-sports':'⚽','bein-premium':'🏆','bein-movies':'🎬','bein-entertainment':'🎭',
  'news':'📰','sports':'🏅','entertainment':'📺','movies-channels':'🎬',
  'kids':'🧸','music':'🎵','documentary':'🌍','religious':'🕌','general':'📺',
  'action':'💥','comedy':'😂','drama':'🎭','horror':'👻','sci-fi':'🚀',
  'animation':'🎨','arabic':'🌙','thriller':'🔪','romance':'💕',
  'arabic-series':'🌙'
};

// Save/Load session
function saveSession() {
  const data = { serverUrl, token, loginMode, xtreamCredentials };
  localStorage.setItem('iptv_session', JSON.stringify(data));
}
function loadSession() {
  try {
    const data = JSON.parse(localStorage.getItem('iptv_session'));
    if (data) { serverUrl = data.serverUrl||''; token = data.token; loginMode = data.loginMode||'xtream'; xtreamCredentials = data.xtreamCredentials; return true; }
  } catch(e) {}
  return false;
}

// LOGIN
function switchLoginTab(tab) {
  ['xtream','direct','register'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab?'block':'none');
  document.querySelectorAll('#loginTabs button').forEach((b,i) => b.classList.toggle('active', ['xtream','direct','register'][i]===tab));
  document.getElementById('loginError').style.display = 'none';
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

// Xtream Login (Host + Username + Password)
async function xtreamLogin() {
  try {
    let host = document.getElementById('xt_host').value.trim();
    const user = document.getElementById('xt_user').value.trim();
    const pass = document.getElementById('xt_pass').value;
    if(!host || !user || !pass) return showLoginError('All fields are required');
    // Clean host URL - remove trailing paths like /player_api.php, /get.php etc
    host = host.replace(/\/(player_api\.php|get\.php|xmltv\.php|panel_api\.php).*$/i, '');
    if(host.endsWith('/')) host = host.slice(0,-1);
    if(!host.startsWith('http')) host = 'http://' + host;

    const res = await fetch(`${host}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
    const ct = res.headers.get('content-type')||'';
    if(!ct.includes('json')) throw new Error('Server did not return JSON. Check the host URL.');
    const data = await res.json();
    if(!data.user_info || data.user_info.auth !== 1) throw new Error(data.user_info?.message || 'Invalid credentials');

    serverUrl = host;
    loginMode = 'xtream';
    xtreamCredentials = { host, username: user, password: pass };
    token = null;
    saveSession();
    startApp(data.user_info);
  } catch(e) { showLoginError(e.message); }
}

// Direct Login
async function directLogin() {
  try {
    const user = document.getElementById('d_user').value.trim();
    const pass = document.getElementById('d_pass').value;
    if(!user || !pass) return showLoginError('Username and password required');

    serverUrl = '';
    const res = await fetch(serverUrl+'/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);

    token = data.token;
    loginMode = 'direct';
    xtreamCredentials = null;
    saveSession();
    startApp(data.user);
  } catch(e) { showLoginError(e.message); }
}

// Register
async function registerUser() {
  try {
    const user = document.getElementById('r_user').value.trim();
    const pass = document.getElementById('r_pass').value;
    if(!user || !pass) return showLoginError('All fields required');
    if(pass.length < 4) return showLoginError('Password min 4 chars');

    const res = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);

    token = data.token;
    loginMode = 'direct';
    serverUrl = '';
    saveSession();
    startApp(data.user);
  } catch(e) { showLoginError(e.message); }
}

function playerLogout() {
  localStorage.removeItem('iptv_session');
  token = null; xtreamCredentials = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  closePlayer();
}

// API Helper
async function api(path) {
  if (loginMode === 'xtream' && xtreamCredentials) {
    const {host, username, password} = xtreamCredentials;
    const url = `${host}/player_api.php?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&${path}`;
    const res = await fetch(url);
    return res.json();
  } else {
    const res = await fetch(serverUrl + '/api/content/' + path, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if(!res.ok) { if(res.status===401) playerLogout(); throw new Error('Auth failed'); }
    return res.json();
  }
}

// START APP
async function startApp(userInfo) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('dispUser').textContent = userInfo.username || '';
  // Fix subscription display — Xtream returns is_trial, exp_date; Direct returns subscription
  let sub = userInfo.subscription || userInfo.sub || '';
  if (!sub || sub === 'undefined') {
    // Xtream mode: determine from exp_date and is_trial
    if (userInfo.is_trial === '1') sub = 'trial';
    else if (userInfo.exp_date) {
      const exp = parseInt(userInfo.exp_date);
      const now = Math.floor(Date.now()/1000);
      const daysLeft = Math.floor((exp - now) / 86400);
      if (daysLeft > 300) sub = 'yearly';
      else if (daysLeft > 100) sub = '6months';
      else sub = 'monthly';
    } else sub = 'yearly';
  }
  const badge = document.getElementById('dispSub');
  badge.textContent = sub;
  badge.className = 'badge badge-' + sub;

  // Auto-fill host
  if(!document.getElementById('xt_host').value) {
    document.getElementById('xt_host').value = window.location.origin;
  }

  await loadAllContent();
}

async function loadAllContent() {
  try {
    // If no valid login method, try direct API with server URL
    if (loginMode === 'xtream' && xtreamCredentials && xtreamCredentials.host) {
      // Xtream API — fetch categories first, then content
      const [liveCats, vodCats, serCats, chData, mvData, serData] = await Promise.all([
        api('action=get_live_categories'),
        api('action=get_vod_categories'),
        api('action=get_series_categories'),
        api('action=get_live_streams'),
        api('action=get_vod_streams'),
        api('action=get_series')
      ]);
      // Build category_id → category_name maps
      const liveCatMap = {};
      (Array.isArray(liveCats)?liveCats:[]).forEach(c => { liveCatMap[c.category_id] = c.category_name; });
      const vodCatMap = {};
      (Array.isArray(vodCats)?vodCats:[]).forEach(c => { vodCatMap[c.category_id] = c.category_name; });
      const serCatMap = {};
      (Array.isArray(serCats)?serCats:[]).forEach(c => { serCatMap[c.category_id] = c.category_name; });

      channels = (Array.isArray(chData) ? chData : []).map(c => {
        // Build stream URL: use direct_source if available, otherwise build Xtream URL
        let streamUrl = c.direct_source || '';
        if ((!streamUrl || streamUrl === '') && xtreamCredentials) {
          const {host, username, password} = xtreamCredentials;
          streamUrl = `${host}/${username}/${password}/${c.stream_id}`;
        }
        return {
          id: c.stream_id, name: c.name,
          category: liveCatMap[c.category_id] || c.category_name || 'general',
          stream_url: streamUrl, logo_url: c.stream_icon||'',
          backup_url: c.backup_url||'', backup_url2: c.backup_url2||''
        };
      });
      movies = (Array.isArray(mvData) ? mvData : []).map(m => ({
        id: m.stream_id, title: m.name,
        category: vodCatMap[m.category_id] || m.category_name || 'general',
        video_url: m.direct_source||'', poster_url: m.stream_icon||'',
        backup_url: m.backup_url||'', backup_url2: m.backup_url2||'',
        description: m.plot||'', rating: m.rating||0, year: m.year||'',
        duration: m.duration_secs ? Math.round(m.duration_secs/60) : 0
      }));
      series = (Array.isArray(serData) ? serData : []).map(s => ({
        id: s.series_id, title: s.name,
        category: serCatMap[s.category_id] || s.category_name || s.genre || '',
        poster_url: s.cover||'', description: s.plot||'', rating: s.rating||0,
        year: s.releaseDate||'', episode_count: s.episode_count||0
      }));
    } else if (token) {
      // Direct API
      const base = serverUrl || window.location.origin;
      const [chData, mvData, serData] = await Promise.all([
        fetch(base+'/api/content/channels',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()),
        fetch(base+'/api/content/movies',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()),
        fetch(base+'/api/content/series',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json())
      ]);
      channels = Array.isArray(chData) ? chData : [];
      movies = Array.isArray(mvData) ? mvData : [];
      series = Array.isArray(serData) ? serData : [];
    } else {
      // Fallback - no valid session, logout
      console.error('No valid session for loading content');
      playerLogout();
      return;
    }

    console.log(`Loaded: ${channels.length} channels, ${movies.length} movies, ${series.length} series`);
    renderLive();
    renderMoviesList();
    renderSeriesList();
  } catch(e) {
    console.error('Failed to load content:', e);
    // Show error to user
    document.getElementById('liveGrid').innerHTML = '<div style="text-align:center;padding:40px;color:#ff4757">Failed to load. <a href="#" data-act="retry" style="color:#00d4ff">Retry</a></div>';
  }
}

// Open Series Detail
async function openSeries(id) {
  try {
    let seriesInfo, seasons;

    if (loginMode === 'xtream') {
      const data = await api(`action=get_series_info&series_id=${id}`);
      seriesInfo = data.info || {};
      seasons = {};
      if(data.episodes) {
        Object.keys(data.episodes).forEach(sn => {
          seasons[sn] = data.episodes[sn].map(ep => {
            // Build Xtream stream URL for episode
            let epUrl = ep.direct_source || '';
            if ((!epUrl || epUrl === '') && xtreamCredentials) {
              const {host, username, password} = xtreamCredentials;
              epUrl = `${host}/series/${username}/${password}/${ep.id}.mp4`;
            }
            return {
              id: ep.id, episode_number: ep.episode_num, title: ep.title,
              duration: ep.info?.duration_secs ? Math.round(ep.info.duration_secs/60) : 0,
              video_url: epUrl, backup_url: ep.backup_url||'', backup_url2: ep.backup_url2||'',
              description: ep.info?.plot||''
            };
          });
        });
      }
    } else {
      const data = await api(`series/${id}/episodes`);
      seriesInfo = data.series;
      seasons = data.seasons;
    }

    const s = series.find(x=>x.id===id) || seriesInfo;
    const seasonNums = Object.keys(seasons).sort((a,b)=>a-b);
    const firstSeason = seasonNums[0] || '1';

    document.getElementById('seriesListView').style.display = 'none';
    const detail = document.getElementById('seriesDetail');
    detail.classList.add('show');

    detail.innerHTML = `
      <div class="series-header">
        <div class="poster">${catIcons[s.category||seriesInfo.genre]||'📀'}</div>
        <div class="info">
          <a class="back-btn" data-act="backSeries" style="cursor:pointer">← Back to Series</a>
          <h2>${s.title||seriesInfo.name||''}</h2>
          <div class="tags">
            <span>${catLabels[s.category||seriesInfo.genre]||s.category||seriesInfo.genre||''}</span>
            ${s.year||seriesInfo.releaseDate?`<span>${s.year||seriesInfo.releaseDate}</span>`:''}
            ${s.rating||seriesInfo.rating?`<span>⭐ ${s.rating||seriesInfo.rating}</span>`:''}

          </div>
          <p>${s.description||seriesInfo.plot||''}</p>

function playEpisode(seriesTitle, epNum, epTitle, url, desc, backup, backup2) {

// 24/7 Movie Channel
async function playMovieChannel() {
  window._currentBackups = [];
  try {
    const res = await fetch((serverUrl||window.location.origin) + '/api/movie-channel');
    const data = await res.json();
    if (data.current) {
      window._movieChannelPlaylist = data.playlist;
      window._movieChannelIndex = data.playlist.findIndex(m => m.is_playing);
      playVideo(data.current.video_url, '🎬 24/7 Movies - ' + data.current.title, data.current.category + ' | ' + (data.current.year||''));
      // Auto-play next movie when current ends
      const video = document.getElementById('videoPlayer');
      video.onended = () => playNextMovie();
    }
  } catch(e) { console.error('Movie channel error:', e); }
}

function playNextMovie() {
  if (!window._movieChannelPlaylist) return;
  window._movieChannelIndex = ((window._movieChannelIndex || 0) + 1) % window._movieChannelPlaylist.length;
  const next = window._movieChannelPlaylist[window._movieChannelIndex];
  if (next) playVideo(next.video_url, '🎬 24/7 Movies - ' + next.title, next.category);
}

function tryBackupUrl(title, desc) {
  if (window._currentBackups && window._currentBackupIndex < window._currentBackups.length) {
    const backupUrl = window._currentBackups[window._currentBackupIndex];
    window._currentBackupIndex++;
    console.log('Trying backup URL #' + window._currentBackupIndex + ':', backupUrl);
    playVideo(backupUrl, title + ' (Backup)', desc);
    return true;
  }
  return false;
}

function playVideo(url, title, desc) {
  const video = document.getElementById('videoPlayer');
  const area = document.getElementById('playerArea');

  // Stop current players
  if(window._hls) { window._hls.destroy(); window._hls = null; }
  if(window._mpegts) { window._mpegts.destroy(); window._mpegts = null; }
  video.pause(); video.removeAttribute('src'); video.load();
  video.onended = null;

  if(!url) {
    document.getElementById('playerTitle').textContent = title;
    document.getElementById('playerDesc').textContent = 'No stream URL - Add URL from Admin Panel';
    document.getElementById('playerMeta').style.display = 'block';
    area.classList.add('show');
    window.scrollTo({top:0, behavior:'smooth'});
    return;
  }

  // Detect stream type
  const isHLS = url.includes('.m3u8');
  const isMpegTS = url.match(/:\d+\/[^.]+$/) || url.endsWith('.ts'); // Xtream format or .ts
  const isMp4 = url.includes('.mp4');

  if(isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
    // HLS via hls.js — optimized for no buffering/stuttering
    const hls = new Hls({
      enableWorker: true,
      lowLatencyMode: false,           // disable low latency — prioritize smooth playback
      maxBufferLength: 30,             // buffer up to 30 seconds
      maxMaxBufferLength: 60,          // allow up to 60 seconds max
      maxBufferSize: 60 * 1024 * 1024, // 60MB buffer
      maxBufferHole: 0.5,
      startLevel: -1,                  // auto quality
      abrEwmaDefaultEstimate: 5000000, // assume 5Mbps initially
      abrBandWidthFactor: 0.8,         // conservative bandwidth usage
      abrBandWidthUpFactor: 0.5,
      fragLoadingTimeOut: 20000,        // 20s timeout for fragment loading
      fragLoadingMaxRetry: 6,           // retry 6 times
      fragLoadingRetryDelay: 1000,
      levelLoadingTimeOut: 15000,
      manifestLoadingTimeOut: 15000,
      manifestLoadingMaxRetry: 4,
      levelLoadingMaxRetry: 4,
      startFragPrefetch: true,          // prefetch next fragments
      testBandwidth: true,
      progressive: true,
      backBufferLength: 30              // keep 30s of back buffer
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR, (e, data) => {
      if(data.fatal) {
        if(data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          console.warn('HLS network error, retrying...');
          hls.startLoad();
        } else {
          console.warn('HLS fatal error, trying backup...', data.type);
          hls.destroy();
          window._hls = null;
          if(!tryBackupUrl(title, desc)) {
            document.getElementById('playerDesc').textContent = 'Stream failed - No backup available';
          }
        }
      }
    });
    // Auto recover from buffer stalls
    hls.on(Hls.Events.BUFFER_STALLED_ERROR, () => {
      console.warn('HLS buffer stalled, recovering...');
      hls.startLoad();
    });
    window._hls = hls;
  } else if(isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = url;
    video.play().catch(()=>{});
  } else if(!isMp4 && typeof mpegts !== 'undefined' && mpegts.isSupported()) {
    // MPEG-TS / Xtream streams via mpegts.js - route external URLs through proxy
    const isExternal = url.startsWith('http://') || url.startsWith('https://');
    const streamUrl = isExternal ? '/proxy/stream?url=' + encodeURIComponent(url) : url;
    console.log('Using mpegts.js for:', url, isExternal ? '(via proxy)' : '(direct)');
    const player = mpegts.createPlayer({
      type: 'mpegts',
      isLive: true,
      hasAudio: true,
      hasVideo: true,
      url: streamUrl
    }, {
      enableWorker: false,
      enableStashBuffer: true,
      stashInitialSize: 512 * 1024,       // 512KB initial buffer (bigger = less stuttering)
      lazyLoad: false,
      deferLoadAfterSourceOpen: false,
      liveBufferLatencyChasing: true,
      liveBufferLatencyMaxLatency: 15,    // allow up to 15s buffer
      liveBufferLatencyMinRemain: 5,      // keep at least 5s buffered
      autoCleanupSourceBuffer: true,
      autoCleanupMaxBackwardDuration: 60,
      autoCleanupMinBackwardDuration: 30,
      fixAudioTimestampGap: true,         // fix audio gaps
      accurateSeek: true
    });
    player.attachMediaElement(video);
    player.load();
    player.play().catch(()=>{});
    player.on(mpegts.Events.ERROR, (type, detail, info) => {
      console.warn('mpegts error:', type, detail);
      player.destroy();
      window._mpegts = null;
      if(!tryBackupUrl(title, desc)) {
        document.getElementById('playerDesc').textContent = 'Stream error - trying backup...';
      }
    });
    // Auto-reconnect if loading completes unexpectedly (stream dropped)
    player.on(mpegts.Events.LOADING_COMPLETE, () => {
      console.log('Stream loading complete - reconnecting in 3s...');
      setTimeout(() => {
        if(window._mpegts === player) {
          player.destroy();
          window._mpegts = null;
          playVideo(url, title.replace(' (Reconnecting)', ''), desc);
        }
      }, 3000);
    });
    window._mpegts = player;
  } else {
    // Fallback: direct (mp4, webm, etc.)
    video.src = url;
    video.play().catch(()=>{});
  }

  // Anti-stutter: detect stalls and auto-recover
  let stallTimer = null;
  video.addEventListener('waiting', () => {
    if (stallTimer) clearTimeout(stallTimer);
    stallTimer = setTimeout(() => {
      if (video.paused || video.readyState < 3) {
        console.warn('Video stalled for too long, attempting recovery...');
        if (video.buffered.length > 0) {
          // Jump to the latest buffered position
          const end = video.buffered.end(video.buffered.length - 1);
          if (end - video.currentTime > 2) {
            video.currentTime = end - 0.5;
          }
        }
        video.play().catch(()=>{});
      }
    }, 5000);
  });
  video.addEventListener('playing', () => { if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; } });

  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerDesc').textContent = desc;
  document.getElementById('playerMeta').style.display = 'block';
  area.classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function closePlayer() {
  if(window._hls) { window._hls.destroy(); window._hls = null; }
  if(window._mpegts) { window._mpegts.destroy(); window._mpegts = null; }
  const video = document.getElementById('videoPlayer');
  video.pause(); video.removeAttribute('src'); video.load();
  document.getElementById('playerArea').classList.remove('show');
  document.getElementById('playerMeta').style.display = 'none';
}

  if(loginMode==='xtream' && xtreamCredentials && xtreamCredentials.host) {
    fetch(`${xtreamCredentials.host}/player_api.php?username=${encodeURIComponent(xtreamCredentials.username)}&password=${encodeURIComponent(xtreamCredentials.password)}`)
      .then(r => {
        const ct = r.headers.get('content-type')||'';
        if(!ct.includes('json')) throw new Error('Server returned non-JSON');
        return r.json();
      })
      .then(data=>{
        if(data.user_info?.auth===1) {
          serverUrl = xtreamCredentials.host;
          startApp(data.user_info);
        }
        else playerLogout();
      })
      .catch(()=>playerLogout());
  } else if(token) {
    fetch((serverUrl||window.location.origin)+'/api/content/profile',{headers:{'Authorization':'Bearer '+token}})
      .then(r=>{if(!r.ok)throw new Error();return r.json()})
      .then(u=>startApp(u))
      .catch(()=>playerLogout());
  } else {
    // Session corrupted, show login
    playerLogout();
  }
} else {
  document.getElementById('loginPage').style.display = 'flex';
}

// ===== Global Event Delegation for all onclick =====
document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-act]');
  if (!el) return;
  e.preventDefault();
  const act = el.dataset.act;
  const id = el.dataset.id;
  switch(act) {
    case 'loginTab': switchLoginTab(el.dataset.tab); break;
    case 'showTab': showTab(el.dataset.tab); break;
    case 'profile': showTab('profile'); break;
    case 'logout': playerLogout(); break;
    case 'closePlayer': closePlayer(); break;
    case 'playLive': playLive(parseInt(id)); break;
    case 'playMovie': playMovie(parseInt(id)); break;
    case 'openSeries': openSeries(parseInt(id)); break;
    case 'movieChannel': playMovieChannel(); break;
    case 'backSeries': renderSeriesList(); break;
    case 'showSeason': showSeason(parseInt(id)); break;
    case 'liveFilter': liveFilter = el.dataset.cat || null; renderLive(); break;
    case 'movieFilter': movieListFilter = el.dataset.cat || null; renderMoviesList(); break;
    case 'seriesFilter': seriesListFilter = el.dataset.cat || null; renderSeriesList(); break;
    case 'retry': loadAllContent(); break;
    case 'playEp':
      playEpisode(
        el.dataset.series||'',
        parseInt(el.dataset.epnum||0),
        el.dataset.eptitle||'',
        el.dataset.url||'',
        el.dataset.desc||'',
        el.dataset.backup||'',
        el.dataset.backup2||''
      );
      break;
  }
});

// ===== #5 GLOBAL SEARCH =====
document.getElementById('globalSearch').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if (q.length < 2) { box.style.display = 'none'; return; }

  const results = [];
  // Search channels
  channels.filter(c => c.name.toLowerCase().includes(q) || (c.category||'').toLowerCase().includes(q)).slice(0, 8).forEach(c => {
    results.push({ type: 'live', icon: catIcons[c.category]||'📺', title: c.name, sub: catLabels[c.category]||c.category, id: c.id, badge: 'LIVE', badgeColor: '#e94560' });
  });
  // Search movies
  movies.filter(m => m.title.toLowerCase().includes(q) || (m.category||'').toLowerCase().includes(q) || (m.description||'').toLowerCase().includes(q)).slice(0, 8).forEach(m => {
    results.push({ type: 'movie', icon: '🎬', title: m.title, sub: (m.year||'') + ' • ' + (m.category||'') + (m.rating ? ' • ⭐'+m.rating : ''), id: m.id, badge: 'VOD', badgeColor: '#6c5ce7' });
  });
  // Search series
  series.filter(s => s.title.toLowerCase().includes(q) || (s.category||'').toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q)).slice(0, 8).forEach(s => {
    results.push({ type: 'series', icon: '📀', title: s.title, sub: (s.category||'') + (s.rating ? ' • ⭐'+s.rating : ''), id: s.id, badge: 'SERIES', badgeColor: '#00b894' });
  });

  if (!results.length) {
    box.innerHTML = '<div style="padding:20px;text-align:center;color:#4a5a7a">No results for "' + q + '"</div>';
  } else {
    box.innerHTML = results.map(r => `
      <div data-act="searchClick" data-type="${r.type}" data-id="${r.id}" style="display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid #1a2040;transition:background 0.15s" onmouseover="this.style.background='#1a2040'" onmouseout="this.style.background=''">
        <span style="font-size:22px;width:32px;text-align:center">${r.icon}</span>
        <div style="flex:1;min-width:0"><div style="font-size:14px;color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</div><div style="font-size:11px;color:#4a5a7a">${r.sub}</div></div>
        <span style="padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:${r.badgeColor};color:white">${r.badge}</span>
      </div>
    `).join('');
  }
  box.style.display = 'block';
});

// Close search on click outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('#globalSearch') && !e.target.closest('#searchResults')) {
    document.getElementById('searchResults').style.display = 'none';
  }
});

// Handle search result clicks
document.getElementById('searchResults').addEventListener('click', (e) => {
  const item = e.target.closest('[data-act="searchClick"]');
  if (!item) return;
  const type = item.dataset.type;
  const id = parseInt(item.dataset.id);
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('globalSearch').value = '';
  if (type === 'live') { showTab('live'); playLive(id); }
  else if (type === 'movie') { showTab('movies'); playMovie(id); }
  else if (type === 'series') { showTab('series'); showSeriesDetail(id); }
});
</script>
